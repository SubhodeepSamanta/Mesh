version: '3.8'
services:
  signaling:
    build: ./packages/signaling
    mem_limit: 150m
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - TRUST_PROXY=0
      - MAX_PEERS_PER_ROOM=16
      - MAX_ROOMS=5000
      - TURN_URL=turn:$${EXTERNAL_IP:-127.0.0.1}:3478
      - TURN_SECRET=$${TURN_SECRET:-meshsecret}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  coturn:
    image: coturn/coturn:latest
    mem_limit: 250m
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    command:
      - -n
      - --log-file=stdout
      - --external-ip=$${EXTERNAL_IP:-127.0.0.1}
      - --static-auth-secret=$${TURN_SECRET:-meshsecret}
      - --realm=$${TURN_REALM:-mesh.local}
    restart: unless-stopped