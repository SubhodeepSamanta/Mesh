name: Deploy Mesh Backend

on:
  push:
    branches:
      - main
    paths:
      - 'packages/signaling/**'
      - 'packages/engine/**'
      - 'packages/cli/**'
      - 'docker-compose.yml'
      - 'docker-compose.override.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}

          script: |
            set -e

            cd ~/mesh

            # The VM is a deploy target, not a workspace: make it an exact
            # mirror of origin/main. Unlike `git pull`, this never merges, so
            # local drift or a rewritten/force-pushed history can't break it.
            git fetch origin main
            git reset --hard origin/main

            # Recreates only services whose config/image changed — no full
            # stack teardown, so coturn/caddy stay up through web-only deploys.
            docker compose up -d --build --remove-orphans

            docker image prune -f

            # Keep the DHT bootstrap daemon on the same code as the repo.
            cd packages/cli
            sudo npm install -g .
            sudo systemctl restart mesh-daemon || true

            cd ~/mesh
            docker compose ps
